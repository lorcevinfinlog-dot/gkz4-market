<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вывод средств | GKZ4</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; padding: 40px; }
        .box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { background: #ff8c00; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .req-item { background: #161616; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid #ff8c00; }
        .done-btn { background: #28a745; color: white; padding: 5px 10px; text-decoration: none; border-radius: 5px; float: right; }
    </style>
</head>
<body>
    <div class="box">
        {% if admin_mode %}
            <h2>Заявки на выплату 🛠️</h2>
            {% for r in requests %}
                <div class="req-item">
                    <a href="/complete_withdraw/{{ r.id }}" class="done-btn">ВЫПЛАЧЕНО</a>
                    <b>{{ r.username }}</b>: {{ r.amount }} руб.<br>
                    <small style="color: #666;">Реквизиты: {{ r.details }}</small>
                </div>
            {% else %}
                <p>Новых заявок пока нет.</p>
            {% endfor %}
            <hr>
        {% endif %}

        <h2>Вывод средств</h2>
        <p>Минимальная сумма: 100 руб. <br>Ваш баланс: {{ user_balance }} руб.</p>
        <form method="POST">
            <input type="number" name="amount" placeholder="Сумма" min="100" required>
            <input type="text" name="details" placeholder="Номер карты или СБП" required>
            <button type="submit">СОЗДАТЬ ЗАЯВКУ</button>
        </form>
        <a href="/" style="color: #555; display: block; text-align: center; margin-top: 20px; text-decoration: none;">Назад</a>
    </div>
</body>
</html>
