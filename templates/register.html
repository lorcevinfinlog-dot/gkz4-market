<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Playerok Clone</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #161616; padding: 40px; border-radius: 24px; border: 1px solid #222; width: 100%; max-width: 350px; text-align: center; }
        .logo { color: #ff8c00; font-size: 28px; font-weight: 900; margin-bottom: 30px; display: block; text-decoration: none; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff8c00; }
        .btn { width: 100%; padding: 14px; background: #ff8c00; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #e67e00; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #ff8c00; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="/" class="logo">PLAYEROK</a>
        <h2 style="margin-bottom: 10px;">Регистрация</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Введите ваш ник из Roblox</p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Ник Roblox" required>
            <input type="password" name="password" placeholder="Придумайте пароль" required>
            <button type="submit" class="btn">СОЗДАТЬ АККАУНТ</button>
        </form>
        
        <div class="footer-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>
</body>
</html>
