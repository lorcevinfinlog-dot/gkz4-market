<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ game.name }} | Gkz4 Market</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .nav-back { color: #555; text-decoration: none; font-size: 14px; margin-bottom: 20px; display: block; }
        .add-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; max-width: 500px; margin-bottom: 40px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: #ff8c00; }
        .btn-pub { background: #ff8c00; color: #000; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #161616; border: 1px solid #222; border-radius: 20px; overflow: hidden; position: relative; padding-bottom: 12px; }
        .item img { width: 100%; height: 140px; object-fit: cover; }
        .price { color: #ff8c00; font-size: 18px; font-weight: 800; padding: 10px; }
        .del-btn { background: #ff4444; color: #fff; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; position: absolute; top: 10px; right: 10px; font-size: 10px; text-decoration: none; }
    </style>
</head>
<body>
    <a href="/" class="nav-back">← Назад</a>
    <h1>{{ game.icon }} {{ game.name }}</h1>

    {% if user %}
    <div class="add-box">
        <h3 style="margin-top:0; color: #ff8c00;">Выставить товар</h3>
        <form action="/add/{{ game_key }}" method="POST">
            <select name="item_type" id="type-select" onchange="updateHint()">
                {% for opt in game.options %}
                    <option value="{{ opt }}">{{ opt }}</option>
                {% endfor %}
            </select>
            
            <input type="text" name="custom_info" id="info-input" placeholder="{{ game.hint }}" required>
            <input type="number" name="price" placeholder="Цена (в {{ game.currency }})" required>
            <input type="text" name="img" placeholder="Ссылка на фото">
            
            <button type="submit" class="btn-pub">ОПУБЛИКОВАТЬ</button>
        </form>
    </div>

    <script>
    function updateHint() {
        const select = document.getElementById('type-select');
        const input = document.getElementById('info-input');
        const val = select.value.toLowerCase();

        if (val.includes("дн")) { input.placeholder = "Введите кол-во дней (например: 100)"; }
        else if (val.includes("гем")) { input.placeholder = "Введите кол-во гемов"; }
        else if (val.includes("перч") || val.includes("бейдж")) { input.placeholder = "Название (например: Bob)"; }
        else { input.placeholder = "{{ game.hint }}"; }
    }
    updateHint(); // Запуск при загрузке
    </script>
    {% endif %}

    <div class="grid">
        {% for item in items %}
        <div class="item">
            {% if item.owner == user %}
                <a href="/delete/{{ item.id }}" class="del-btn">УДАЛИТЬ</a>
            {% endif %}
            <img src="{{ item.img }}">
            <div style="padding: 10px;">
                <div style="font-size: 14px; color: #ccc; min-height: 40px;">{{ item.name }}</div>
                <div class="price">{{ item.price }}</div>
                <div style="font-size: 11px; color: #444;">Продавец: {{ item.owner }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
