<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; padding: 20px; }
        .chat-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 10px; display: flex; justify-content: space-between; text-decoration: none; color: #fff; }
        .chat-card:hover { border-color: #ff8c00; }
        .btn { background: #ff8c00; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="/" style="color: #555; text-decoration: none;">← На главную</a>
    <h1>Мои чаты</h1>
    {% for other in interlocutors %}
    <a href="/chat/{{ other }}" class="chat-card">
        <span>Переписка с <b>@{{ other }}</b></span>
        <span class="btn">Открыть</span>
    </a>
    {% endfor %}
</body>
</html>
