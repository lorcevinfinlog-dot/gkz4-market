<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с {{ recipient }}</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .head { background: #111; padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #ff8c00; text-decoration: none; font-weight: bold; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0d0d0d; }
        
        .m { max-width: 75%; padding: 10px 15px; border-radius: 12px; font-size: 14px; position: relative; line-height: 1.4; }
        .my { align-self: flex-end; background: #ff8c00; color: #000; border-bottom-right-radius: 2px; }
        .his { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }
        .t { font-size: 9px; opacity: 0.6; text-align: right; margin-top: 4px; }
        
        .input-area { background: #111; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        button { background: #ff8c00; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="head">
        <a href="/my_chats" class="back-btn">← Назад</a>
        <span>Чат с <b style="color: #ff8c00;">{{ recipient }}</b></span>
        <div style="width: 50px;"></div>
    </div>

    <div id="chat-window">
        {% for m in messages %}
            <div class="m {% if m.from == user %}my{% else %}his{% endif %}">
                {{ m.text }}
                <div class="t">{{ m.time }}</div>
            </div>
        {% endfor %}
    </div>

    <form id="chat-form" class="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение..." required autocomplete="off">
        <button type="submit">ОТПРАВИТЬ</button>
    </form>

    <script>
        const chatWin = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');

        // Прокрутка вниз
        function scrollDown() {
            chatWin.scrollTop = chatWin.scrollHeight;
        }
        scrollDown();

        // ФОНОВОЕ ОБНОВЛЕНИЕ ЧАТА
        async function updateChat() {
            try {
                const response = await fetch('/chat/{{ recipient }}');
                const html = await response.text();
                
                const parser = new DOMParser();
                const newDoc = parser.parseFromString(html, 'text/html');
                const newContent = newDoc.getElementById('chat-window').innerHTML;
                
                // Если контент изменился (пришло новое сообщение)
                if (chatWin.innerHTML !== newContent) {
                    chatWin.innerHTML = newContent;
                    scrollDown();
                }
            } catch (err) { console.error("Ошибка обновления:", err); }
        }

        // Проверять новые сообщения каждые 2 секунды
        setInterval(updateChat, 2000);

        // ОТПРАВКА СООБЩЕНИЯ (БЕЗ ПЕРЕЗАГРУЗКИ)
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text) return;

            const data = new FormData();
            data.append('text', text);

            msgInput.value = ''; // Очистить поле ввода

            try {
                await fetch('/send_message/{{ recipient }}', {
                    method: 'POST',
                    body: data
                });
                updateChat(); // Сразу обновить чат после отправки
            } catch (err) { alert("Ошибка при отправке!"); }
        };
    </script>
</body>
</html>
